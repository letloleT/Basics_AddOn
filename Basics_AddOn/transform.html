<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Transform</title>
    <style>
      body {
        margin: 200px;
      }
      img.gaborone1 {
        width: 200px;
        transform: scale(0.5) rotate(120deg);
      }
      img.gaborone2 {
        width: 200px;
        transform: rotate(75deg);
      }
      img.gaborone3 {
        width: 200px;
        transform: translateX(-50px) rotate(-25deg) scale(1.2);
      }
      img.gaborone4 {
        width: 200px;
        transform: translateY(-100px) scale(0.8) rotate(50deg) translateX(200px);
      }
    </style>
  </head>
  <body>
    <img src="./images/gabs.jpg" class="gaborone1" alt="Gaborone" />
    <img src="./images/gabs_1.jpg" class="gaborone2" alt="Gaborone" />
    <img src="./images/gabs_2.jpg" class="gaborone3" alt="Gaborone" />
    <img src="./images/gabs_3.jpg" class="gaborone4" alt="Gaborone" />
  </body>
</html>
